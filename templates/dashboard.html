<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Note Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h2 {
            color: #1db954;
            margin-bottom: 5px;
        }

        .username {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .dashboard-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: #1db954;
            color: #000;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            transition: background 0.3s ease;
            box-sizing: border-box;
        }

        .dashboard-btn:hover {
            background: #1ed760;
        }

        .secondary {
            background: #2a2a2a;
            color: #ffffff;
        }

        .secondary:hover {
            background: #3a3a3a;
        }

        .logout {
            background: #ff4d4d;
            color: #ffffff;
        }

        .logout:hover {
            background: #ff6666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Dashboard</h2>

        <div class="username">
            Welcome, <strong>{{ session['user'] }}</strong>
        </div>

        <a href="{{ url_for('addnotes') }}" class="dashboard-btn">
            ➕ Add Notes
        </a>

        <a href="{{ url_for('uploadfile') }}" class="dashboard-btn secondary">
            📁 Files
        </a>

        <a href="{{ url_for('viewallfiles') }}" class="dashboard-btn secondary">
            📄 View Uploaded Files
        </a>

        <a href="{{ url_for('viewnotes') }}" class="dashboard-btn secondary">
            📄 View Notes
        </a>
        
        <a href="{{ url_for('getexceldata') }}" class="dashboard-btn secondary">
            📊 Get Excel Data
        </a>

        <!-- Logout route not active in app.py yet -->
        <a href="{{ url_for('logout') }}" class="dashboard-btn logout">
            🚪 Logout
        </a>

    </div>
</body>
</html>
