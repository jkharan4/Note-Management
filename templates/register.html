<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Note Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        h2 {
            text-align: center;
            color: #1db954;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #2a2a2a;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #aaaaaa;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #1db954;
            color: #000;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s ease;
            box-sizing: border-box;
        }

        button:hover {
            background: #1ed760;
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #b3b3b3;
        }

        .login-link a {
            color: #1db954;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <div class="subtitle">
            Start managing your notes securely
        </div>

        <form method="POST" action="/register">
            <input type="text" name="uname" placeholder="Full Name" required>
            <input type="email" name="uemail" placeholder="Email Address" required>
            <input type="password" name="upassword" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>
        </form>

        <div class="login-link">
            Already have an account?
            <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
