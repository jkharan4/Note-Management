<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Note Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h2 {
            color: #1db954;
            margin-bottom: 5px;
        }

        .summary {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: none;
            background: #1db954;
            color: #000;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s ease;
            box-sizing: border-box;
        }

        button:hover {
            background: #1ed760;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome</h2>

        <div class="summary">
            A simple and secure note management application to store, organize,
            and access your notes anytime, anywhere.
        </div>

        <button onclick="location.href='/login'">Login</button>
        <button onclick="location.href='/register'">Register</button>
    </div>
</body>
</html>
