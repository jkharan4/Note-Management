<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Upload File | Note Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h2 {
            color: #1db954;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #2a2a2a;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #1db954;
            color: #000;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #1ed760;
        }

        .back-link {
            margin-top: 18px;
        }

        .back-link a {
            color: #1db954;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Upload File</h2>
        <div class="subtitle">
            Store your files securely
        </div>

        <form method="POST" action="/uploadfile" 
            enctype="multipart/form-data">
            <input type="file" name="Filedata" required>
            <button type="submit">Upload File</button>
        </form>


        <div class="back-link">
            <a href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
        </div>
    </div>

</body>

</html>
